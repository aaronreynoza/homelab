name: Proxmox Infrastructure

on:
  push:
    paths:
      - 'proxmox/**'
      - '.github/workflows/proxmox-infra.yml'
  workflow_dispatch:

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.0.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ./proxmox
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET}}" \
            -backend-config="key=proxmox-infra/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: ./proxmox
        run: |
          terraform plan \
            -var="proxmox_api_url=${{ secrets.PROXMOX_API_URL }}" \
            -var="proxmox_api_token_id=${{ secrets.PROXMOX_API_TOKEN_ID }}" \
            -var="proxmox_api_token_secret=${{ secrets.PROXMOX_API_TOKEN_SECRET }}" \
            -var="proxmox_node=${{ secrets.PROXMOX_NODE }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="vpn_server_ip=${{ secrets.WIREGUARD_SERVER_IP }}" \
            -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ./proxmox
        run: |
          terraform apply -auto-approve tfplan
          terraform output -json > tf_output.json
        
      - name: Update Ansible Inventory
        if: github.ref == 'refs/heads/main'
        run: |
          PROXMOX_IP=$(jq -r '.proxmox_ip.value' proxmox/tf_output.json)
          echo "[proxmox_host]" > ansible/inventory.ini
          echo "$PROXMOX_IP" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[all:vars]" >> ansible/inventory.ini
          echo "ansible_python_interpreter=/usr/bin/python3" >> ansible/inventory.ini
          echo "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> ansible/inventory.ini
          
          # Commit and push changes
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add ansible/inventory.ini
          git commit -m "Update inventory with new Proxmox IP" || echo "No changes to commit"
          git push
