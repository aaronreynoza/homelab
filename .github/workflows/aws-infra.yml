name: AWS Infrastructure

on:
  push:
    paths:
      - 'aws/**'
      - '.github/workflows/aws-infra.yml'
  workflow_dispatch:

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.0.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ./aws
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Plan
        working-directory: ./aws
        run: |
          terraform plan \
            -var="key_name=${{ secrets.AWS_KEY_NAME }}" \
            -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ./aws
        run: |
          terraform apply -auto-approve tfplan
          terraform output -json > tf_output.json
        
      - name: Update Ansible Inventory
        if: github.ref == 'refs/heads/main'
        run: |
          WIREGUARD_IP=$(jq -r '.wireguard_ip.value' aws/tf_output.json)
          echo "[wireguard_server]" > ansible/inventory.ini
          echo "$WIREGUARD_IP" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[all:vars]" >> ansible/inventory.ini
          echo "ansible_python_interpreter=/usr/bin/python3" >> ansible/inventory.ini
          echo "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> ansible/inventory.ini
          
          # Commit and push changes
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add ansible/inventory.ini
          git commit -m "Update inventory with new WireGuard server IP" || echo "No changes to commit"
          git push
