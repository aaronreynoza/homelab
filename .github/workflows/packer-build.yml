name: packer-build

on:
  workflow_dispatch:
  push:
    paths:
      - "packer/**"

jobs:
  build-talos-template:
    runs-on: [self-hosted, proxmox]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v2
        with:
          version: latest

      - name: Build Talos template on Proxmox
        env:
          PACKER_LOG: "1"
        run: |
          packer init packer
          packer build \
            -var "proxmox_url=${{ secrets.PROXMOX_URL }}" \
            -var "proxmox_username=${{ secrets.PROXMOX_USERNAME }}" \
            -var "proxmox_password=${{ secrets.PROXMOX_PASSWORD }}" \
            -var "proxmox_node=${{ secrets.PROXMOX_NODE }}" \
            -var "storage_pool=${{ secrets.PROXMOX_STORAGE || 'local-lvm' }}" \
            -var "network_bridge=${{ secrets.PROXMOX_BRIDGE || 'vmbr0' }}" \
            -var "template_name=template-talos" \
            -var "talos_version=${{ vars.TALOS_VERSION || 'v1.7.4' }}" \
            -var "talos_iso_url=${{ vars.TALOS_ISO_URL || 'https://github.com/siderolabs/talos/releases/download/v1.7.4/metal-amd64.iso' }}" \
            -var "talos_iso_checksum=${{ vars.TALOS_ISO_CHECKSUM || '' }}" \
            packer/talos-template.pkr.hcl
