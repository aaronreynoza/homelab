name: Ansible Deployment

on:
  push:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment (all, aws, proxmox)'
        required: true
        default: 'all'

jobs:
  deploy:
    name: 'Deploy with Ansible'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run Ansible Playbooks
        run: |
          cd ansible
          
          # Always update the inventory with the latest IPs
          echo "[wireguard_server]" > inventory.ini
          echo "${{ secrets.WIREGUARD_SERVER_IP }}" >> inventory.ini
          echo "" >> inventory.ini
          echo "[proxmox_host]" >> inventory.ini
          echo "${{ secrets.PROXMOX_HOST_IP }}" >> inventory.ini
          echo "" >> inventory.ini
          echo "[all:vars]" >> inventory.ini
          echo "ansible_python_interpreter=/usr/bin/python3" >> inventory.ini
          echo "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory.ini
          
          # Run playbooks based on the target
          if [ "${{ github.event.inputs.target }}" = "all" ] || [ "${{ github.event.inputs.target }}" = "aws" ]; then
            ansible-playbook -i inventory.ini aws-wireguard.yml --extra-vars "wireguard_server_public_key=${{ secrets.WIREGUARD_SERVER_PUBLIC_KEY }}" --private-key ${{ secrets.SSH_PRIVATE_KEY }}
          fi
          
          if [ "${{ github.event.inputs.target }}" = "all" ] || [ "${{ github.event.inputs.target }}" = "proxmox" ]; then
            ansible-playbook -i inventory.ini proxmox-setup.yml --extra-vars "wireguard_server_public_key=${{ secrets.WIREGUARD_SERVER_PUBLIC_KEY }}" --private-key ${{ secrets.SSH_PRIVATE_KEY }}
          fi
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          WIREGUARD_SERVER_IP: ${{ secrets.WIREGUARD_SERVER_IP }}
          PROXMOX_HOST_IP: ${{ secrets.PROXMOX_HOST_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
