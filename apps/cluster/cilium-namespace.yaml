apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-namespace
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" 
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: cilium-system
  source:
    repoURL: https://github.com/empty/repo.git
    targetRevision: HEAD
    path: .
    directory:
      recurse: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true