apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: cilium-system
  hostnames:
    - "grafana.aaron.reynoza.org"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
