apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: cilium-system
  hostnames:
    - "argocd.aaron.reynoza.org"
  rules:
    - backendRefs:
        - name: argocd-server
          port: 443
