apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zitadel-postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 16.7.8
    helm:
      values: |
        auth:
          username: zitadel
          database: zitadel
          existingSecret: zitadel-credentials
          secretKeys:
            userPasswordKey: postgresql-password
            adminPasswordKey: postgres-password
        primary:
          persistence:
            enabled: true
            storageClass: longhorn
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: zitadel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
