apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-cluster-zitadel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cluster
    targetRevision: 0.6.0
    helm:
      values: |
        mode: standalone
        cluster:
          instances: 1
          enableSuperuserAccess: true
          enablePDB: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          storage:
            size: 5Gi
            storageClass: longhorn-db
          walStorage:
            enabled: true
            size: 2Gi
            storageClass: longhorn-db
          postgresql:
            parameters:
              shared_buffers: "64MB"
              effective_cache_size: "192MB"
              work_mem: "4MB"
              maintenance_work_mem: "32MB"
              max_connections: "50"
              random_page_cost: "1.1"
              effective_io_concurrency: "200"
              max_wal_size: "256MB"
              min_wal_size: "64MB"
              checkpoint_completion_target: "0.9"
              log_min_duration_statement: "1000"
          monitoring:
            enabled: true
            podMonitor:
              enabled: true
          initdb:
            database: zitadel
            owner: zitadel
        backups:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: zitadel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
