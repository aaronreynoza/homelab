apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-namespace-workload
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana-folder: "Cluster"
data:
  namespace-workload.json: |
    {
      "uid": "namespace-workload",
      "title": "Namespace & Workload",
      "description": "Resource usage, workload status, and pod health per namespace",
      "editable": true,
      "timezone": "browser",
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "query": "label_values(kube_namespace_created, namespace)",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "Resource Usage",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false,
          "id": 100
        },
        {
          "id": 1,
          "title": "CPU: Usage vs Requests vs Limits",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "B" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }
                ]
              },
              {
                "matcher": { "id": "byFrameRefID", "options": "C" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [5, 5] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["mean", "max"]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\",container!=\"\"}[5m]))",
              "legendFormat": "{{namespace}} actual",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "B",
              "expr": "sum by (namespace) (kube_pod_container_resource_requests{namespace=~\"$namespace\",resource=\"cpu\"})",
              "legendFormat": "{{namespace}} requests",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "C",
              "expr": "sum by (namespace) (kube_pod_container_resource_limits{namespace=~\"$namespace\",resource=\"cpu\"})",
              "legendFormat": "{{namespace}} limits",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 2,
          "title": "Memory: Usage vs Requests vs Limits",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byFrameRefID", "options": "B" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }
                ]
              },
              {
                "matcher": { "id": "byFrameRefID", "options": "C" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [5, 5] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["mean", "max"]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace) (container_memory_working_set_bytes{namespace=~\"$namespace\",container!=\"\"})",
              "legendFormat": "{{namespace}} actual",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "B",
              "expr": "sum by (namespace) (kube_pod_container_resource_requests{namespace=~\"$namespace\",resource=\"memory\"})",
              "legendFormat": "{{namespace}} requests",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "C",
              "expr": "sum by (namespace) (kube_pod_container_resource_limits{namespace=~\"$namespace\",resource=\"memory\"})",
              "legendFormat": "{{namespace}} limits",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "type": "row",
          "title": "Workloads",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "collapsed": false,
          "id": 101
        },
        {
          "id": 3,
          "title": "Deployments",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Time" },
                "properties": [
                  { "id": "custom.hidden", "value": true }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #A" },
                "properties": [
                  { "id": "displayName", "value": "Replicas" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #B" },
                "properties": [
                  { "id": "displayName", "value": "Desired" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #C" },
                "properties": [
                  { "id": "displayName", "value": "Ready" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #D" },
                "properties": [
                  { "id": "displayName", "value": "Available" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              { "displayName": "namespace", "desc": false }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_deployment_status_replicas{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "B",
              "expr": "kube_deployment_spec_replicas{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "C",
              "expr": "kube_deployment_status_replicas_ready{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "D",
              "expr": "kube_deployment_status_replicas_available{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "app_kubernetes_io_name": true,
                  "app_kubernetes_io_version": true,
                  "instance": true,
                  "job": true,
                  "uid": true,
                  "container": true,
                  "endpoint": true,
                  "pod": true,
                  "service": true
                },
                "renameByName": {
                  "deployment": "Deployment",
                  "namespace": "Namespace"
                },
                "indexByName": {
                  "namespace": 0,
                  "deployment": 1,
                  "Value #B": 2,
                  "Value #C": 3,
                  "Value #D": 4,
                  "Value #A": 5
                }
              }
            }
          ]
        },
        {
          "id": 4,
          "title": "StatefulSets",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Time" },
                "properties": [
                  { "id": "custom.hidden", "value": true }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #A" },
                "properties": [
                  { "id": "displayName", "value": "Replicas" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #B" },
                "properties": [
                  { "id": "displayName", "value": "Desired" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #C" },
                "properties": [
                  { "id": "displayName", "value": "Ready" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              { "displayName": "namespace", "desc": false }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_statefulset_status_replicas{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "B",
              "expr": "kube_statefulset_replicas{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "C",
              "expr": "kube_statefulset_status_replicas_ready{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "app_kubernetes_io_name": true,
                  "app_kubernetes_io_version": true,
                  "instance": true,
                  "job": true,
                  "uid": true,
                  "container": true,
                  "endpoint": true,
                  "pod": true,
                  "service": true
                },
                "renameByName": {
                  "statefulset": "StatefulSet",
                  "namespace": "Namespace"
                },
                "indexByName": {
                  "namespace": 0,
                  "statefulset": 1,
                  "Value #B": 2,
                  "Value #C": 3,
                  "Value #A": 4
                }
              }
            }
          ]
        },
        {
          "type": "row",
          "title": "Pods",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "collapsed": false,
          "id": 102
        },
        {
          "id": 5,
          "title": "Pod Restarts (last 1h)",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Time" },
                "properties": [
                  { "id": "custom.hidden", "value": true }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Restarts" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              { "displayName": "Restarts", "desc": true }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[1h])) > 0",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true
                },
                "renameByName": {
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "Value": "Restarts"
                },
                "indexByName": {
                  "namespace": 0,
                  "pod": 1,
                  "Value": 2
                }
              }
            }
          ]
        },
        {
          "id": 6,
          "title": "Running Containers",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 19 },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_status_running{namespace=~\"$namespace\"})",
              "legendFormat": "Running",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 7,
          "title": "Waiting Containers",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 19 },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "yellow"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_status_waiting{namespace=~\"$namespace\"})",
              "legendFormat": "Waiting",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 8,
          "title": "Terminated Containers",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 19 },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "red"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_status_terminated{namespace=~\"$namespace\"})",
              "legendFormat": "Terminated",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
