apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-app-specific
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana-folder: "Applications"
data:
  app-specific.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": {
        "list": []
      },
      "description": "Application-specific metrics for ArgoCD, cert-manager, Longhorn, Harbor, Forgejo, and Cilium",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "ArgoCD",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "fixed", "fixedColor": "green" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Out of Sync" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(argocd_app_info{sync_status=\"Synced\"})",
              "legendFormat": "Synced",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(argocd_app_info{sync_status!=\"Synced\"})",
              "legendFormat": "Out of Sync",
              "refId": "B"
            }
          ],
          "title": "App Sync Status",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "fixed", "fixedColor": "green" }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(argocd_app_info{health_status=\"Healthy\"})",
              "legendFormat": "Healthy",
              "refId": "A"
            }
          ],
          "title": "App Health",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 1 },
          "id": 4,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(argocd_app_reconcile_bucket[5m])) by (le))",
              "legendFormat": "p95 Reconciliation",
              "refId": "A"
            }
          ],
          "title": "Reconciliation Duration p95",
          "type": "timeseries"
        },
        {
          "collapsed": true,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 5,
          "title": "cert-manager",
          "type": "row",
          "panels": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "green", "value": null }
                    ]
                  },
                  "color": { "mode": "fixed", "fixedColor": "green" }
                },
                "overrides": []
              },
              "gridPos": { "h": 6, "w": 8, "x": 0, "y": 8 },
              "id": 6,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "auto",
                "textMode": "auto",
                "reduceOptions": {
                  "calcs": ["lastNotNull"],
                  "fields": "",
                  "values": false
                }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "sum(certmanager_certificate_ready_status{condition=\"True\"})",
                  "legendFormat": "Ready",
                  "refId": "A"
                }
              ],
              "title": "Certificates Ready",
              "type": "stat"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "custom": {
                    "align": "auto",
                    "displayMode": "auto"
                  },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "red", "value": null },
                      { "color": "yellow", "value": 14 },
                      { "color": "green", "value": 30 }
                    ]
                  }
                },
                "overrides": [
                  {
                    "matcher": { "id": "byName", "options": "Value" },
                    "properties": [
                      { "id": "displayName", "value": "Days Until Expiry" },
                      { "id": "custom.displayMode", "value": "color-background" },
                      { "id": "thresholds", "value": {
                        "mode": "absolute",
                        "steps": [
                          { "color": "red", "value": null },
                          { "color": "yellow", "value": 14 },
                          { "color": "green", "value": 30 }
                        ]
                      }},
                      { "id": "decimals", "value": 1 }
                    ]
                  }
                ]
              },
              "gridPos": { "h": 6, "w": 16, "x": 8, "y": 8 },
              "id": 7,
              "options": {
                "showHeader": true,
                "sortBy": [
                  { "displayName": "Days Until Expiry", "desc": false }
                ]
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400",
                  "format": "table",
                  "instant": true,
                  "legendFormat": "",
                  "refId": "A"
                }
              ],
              "transformations": [
                {
                  "id": "organize",
                  "options": {
                    "excludeByName": {
                      "Time": true,
                      "__name__": true,
                      "condition": true,
                      "container": true,
                      "endpoint": true,
                      "exported_namespace": true,
                      "instance": true,
                      "job": true,
                      "pod": true,
                      "service": true
                    },
                    "renameByName": {
                      "namespace": "Namespace",
                      "name": "Name",
                      "Value": "Days Until Expiry"
                    }
                  }
                }
              ],
              "title": "Certificate Expiry",
              "type": "table"
            }
          ]
        },
        {
          "collapsed": true,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 8 },
          "id": 8,
          "title": "Longhorn",
          "type": "row",
          "panels": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "green", "value": null }
                    ]
                  },
                  "color": { "mode": "fixed", "fixedColor": "green" }
                },
                "overrides": []
              },
              "gridPos": { "h": 6, "w": 8, "x": 0, "y": 9 },
              "id": 9,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "auto",
                "textMode": "auto",
                "reduceOptions": {
                  "calcs": ["lastNotNull"],
                  "fields": "",
                  "values": false
                }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "count(longhorn_volume_state{state=\"attached\"})",
                  "legendFormat": "Attached",
                  "refId": "A"
                }
              ],
              "title": "Volume Health",
              "type": "stat"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "custom": {
                    "align": "auto",
                    "displayMode": "auto"
                  },
                  "unit": "bytes"
                },
                "overrides": [
                  {
                    "matcher": { "id": "byName", "options": "Value" },
                    "properties": [
                      { "id": "displayName", "value": "Size" },
                      { "id": "unit", "value": "bytes" }
                    ]
                  }
                ]
              },
              "gridPos": { "h": 6, "w": 16, "x": 8, "y": 9 },
              "id": 10,
              "options": {
                "showHeader": true,
                "sortBy": [
                  { "displayName": "Size", "desc": true }
                ]
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "longhorn_volume_actual_size_bytes",
                  "format": "table",
                  "instant": true,
                  "legendFormat": "",
                  "refId": "A"
                }
              ],
              "transformations": [
                {
                  "id": "organize",
                  "options": {
                    "excludeByName": {
                      "Time": true,
                      "__name__": true,
                      "instance": true,
                      "job": true,
                      "endpoint": true,
                      "container": true,
                      "namespace": true,
                      "node": true,
                      "pod": true,
                      "pvc": true,
                      "service": true
                    },
                    "renameByName": {
                      "volume": "Volume",
                      "Value": "Size"
                    }
                  }
                }
              ],
              "title": "Volume Size",
              "type": "table"
            }
          ]
        },
        {
          "collapsed": true,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 11,
          "title": "Harbor",
          "type": "row",
          "panels": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "custom": {
                    "drawStyle": "line",
                    "lineInterpolation": "smooth",
                    "fillOpacity": 10,
                    "pointSize": 5,
                    "showPoints": "auto",
                    "spanNulls": false
                  },
                  "unit": "reqps"
                },
                "overrides": []
              },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 10 },
              "id": 12,
              "options": {
                "legend": { "displayMode": "list", "placement": "bottom" },
                "tooltip": { "mode": "multi", "sort": "desc" }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "sum(rate(harbor_core_http_request_total[5m]))",
                  "legendFormat": "Total",
                  "refId": "A"
                },
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "sum by (code) (rate(harbor_core_http_request_total[5m]))",
                  "legendFormat": "{{code}}",
                  "refId": "B"
                }
              ],
              "title": "Harbor Request Rate",
              "type": "timeseries"
            }
          ]
        },
        {
          "collapsed": true,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 10 },
          "id": 13,
          "title": "Forgejo",
          "type": "row",
          "panels": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "custom": {
                    "drawStyle": "line",
                    "lineInterpolation": "smooth",
                    "fillOpacity": 10,
                    "pointSize": 5,
                    "showPoints": "auto",
                    "spanNulls": false
                  }
                },
                "overrides": []
              },
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 11 },
              "id": 14,
              "options": {
                "legend": { "displayMode": "list", "placement": "bottom" },
                "tooltip": { "mode": "single" }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "go_goroutines{job=~\".*forgejo.*\"}",
                  "legendFormat": "{{instance}}",
                  "refId": "A"
                }
              ],
              "title": "Go Goroutines",
              "type": "timeseries"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "custom": {
                    "drawStyle": "line",
                    "lineInterpolation": "smooth",
                    "fillOpacity": 10,
                    "pointSize": 5,
                    "showPoints": "auto",
                    "spanNulls": false
                  },
                  "unit": "bytes"
                },
                "overrides": []
              },
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 11 },
              "id": 15,
              "options": {
                "legend": { "displayMode": "list", "placement": "bottom" },
                "tooltip": { "mode": "single" }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "go_memstats_alloc_bytes{job=~\".*forgejo.*\"}",
                  "legendFormat": "{{instance}}",
                  "refId": "A"
                }
              ],
              "title": "Go Memory",
              "type": "timeseries"
            }
          ]
        },
        {
          "collapsed": true,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 11 },
          "id": 16,
          "title": "Cilium",
          "type": "row",
          "panels": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "blue", "value": null }
                    ]
                  },
                  "color": { "mode": "fixed", "fixedColor": "blue" }
                },
                "overrides": []
              },
              "gridPos": { "h": 6, "w": 12, "x": 0, "y": 12 },
              "id": 17,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "auto",
                "textMode": "auto",
                "reduceOptions": {
                  "calcs": ["lastNotNull"],
                  "fields": "",
                  "values": false
                }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "sum(cilium_endpoint_count)",
                  "legendFormat": "Endpoints",
                  "refId": "A"
                }
              ],
              "title": "Endpoints",
              "type": "stat"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "purple", "value": null }
                    ]
                  },
                  "color": { "mode": "fixed", "fixedColor": "purple" }
                },
                "overrides": []
              },
              "gridPos": { "h": 6, "w": 12, "x": 12, "y": 12 },
              "id": 18,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "auto",
                "textMode": "auto",
                "reduceOptions": {
                  "calcs": ["lastNotNull"],
                  "fields": "",
                  "values": false
                }
              },
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "sum(cilium_policy_count)",
                  "legendFormat": "Policies",
                  "refId": "A"
                }
              ],
              "title": "Policy Count",
              "type": "stat"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["applications", "argocd", "cert-manager", "longhorn", "harbor", "forgejo", "cilium"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Application Metrics",
      "uid": "app-specific",
      "version": 1
    }
