# Example inventory — replace placeholder IPs with your environment values
[mgmt]
<mgmt-vm-mgmt-ip> ansible_user=operator ansible_ssh_private_key_file=~/.ssh/id_ed25519

[mgmt:vars]
ansible_python_interpreter=/usr/bin/python3
mgmt_ip=<mgmt-vm-mgmt-ip>
vlan10_ip=<mgmt-vm-vlan-ip>
vlan10_gateway=10.10.10.1
vlan_id=10
hostname=mgmt
# NIC name — verify after first boot with 'ip link show'. Cloud images on Proxmox
# typically use ens18 but it depends on PCI slot assignment.
primary_nic=ens18
