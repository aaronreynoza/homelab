---
# AWS WireGuard Server Configuration
wireguard_interface: wg0
wireguard_port: 51820
wireguard_network: 10.10.10.0/24
wireguard_server_ip: 10.10.10.1/24
wireguard_clients:
  - proxmox

# Client IP assignments
wireguard_client_ips:
  proxmox: 10.10.10.2/32

# Proxmox network that should be accessible through the VPN
proxmox_network_cidr: 192.168.1.0/24  # Update this to match your Proxmox network

# System settings
timezone: UTC
ssh_port: 22
