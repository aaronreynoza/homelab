---
- name: Configure WireGuard VPN Server
  hosts: wireguard_server
  become: true
  
  vars_files:
    - ./group_vars/aws.yml
  
  tasks:
    - name: Ensure WireGuard is installed
      apt:
        name: wireguard
        state: present
      when: ansible_os_family == 'Debian'
    
    - name: Create client configuration directory
      file:
        path: /etc/wireguard/clients
        state: directory
        mode: '0700'
    
    - name: Generate client keys
      command: "wg genkey | tee /etc/wireguard/clients/{{ item }}.key | wg pubkey > /etc/wireguard/clients/{{ item }}.pub"
      args:
        creates: "/etc/wireguard/clients/{{ item }}.key"
      with_items: "{{ wireguard_clients }}"
      register: keygen
      changed_when: keygen.changed
    
    - name: Add client configurations
      blockinfile:
        path: /etc/wireguard/wg0.conf
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Client {{ item }}"
        block: |
          [Peer]
          PublicKey = {{ lookup('file', "/etc/wireguard/clients/" ~ item ~ ".pub") | trim }}
          AllowedIPs = {{ wireguard_client_ips[item] }}
          PersistentKeepalive = 25
      with_items: "{{ wireguard_clients }}"
      notify: restart wireguard
    
    - name: Generate client configs
      template:
        src: templates/wg-client.conf.j2
        dest: "/etc/wireguard/clients/{{ item }}.conf"
        mode: '0600'
      with_items: "{{ wireguard_clients }}
      register: client_configs
    
    - name: Generate QR codes for clients
      command: "qrencode -t png -o /etc/wireguard/clients/{{ item }}.png < /etc/wireguard/clients/{{ item }}.conf"
      args:
        creates: "/etc/wireguard/clients/{{ item }}.png"
      with_items: "{{ wireguard_clients }}"
  
  handlers:
    - name: restart wireguard
      systemd:
        name: wg-quick@wg0
        state: restarted
        daemon_reload: yes
