---
- name: Configure Proxmox WireGuard Client
  hosts: proxmox_host
  become: true
  
  vars_files:
    - ./group_vars/proxmox.yml
  
  tasks:
    - name: Ensure WireGuard is installed
      apt:
        name: wireguard
        state: present
      when: ansible_os_family == 'Debian'
    
    - name: Create WireGuard configuration directory
      file:
        path: /etc/wireguard
        state: directory
        mode: '0700'
    
    - name: Generate client keys
      command: "wg genkey | tee /etc/wireguard/private.key | wg pubkey > /etc/wireguard/public.key"
      args:
        creates: /etc/wireguard/private.key
      register: keygen
      changed_when: keygen.changed
    
    - name: Create WireGuard configuration
      template:
        src: templates/wg0.conf.j2
        dest: /etc/wireguard/wg0.conf
        mode: '0600'
      notify: restart wireguard
    
    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: yes
    
    - name: Ensure WireGuard starts on boot
      systemd:
        name: wg-quick@wg0
        enabled: yes
        state: started
  
  handlers:
    - name: restart wireguard
      systemd:
        name: wg-quick@wg0
        state: restarted
        daemon_reload: yes
